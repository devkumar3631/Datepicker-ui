<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <!--Seo Meta Tag-->
    <meta name="description" content="Datepicker ui html and css">
    <meta name="keywords" content="HTML, CSS, Web developement">
    <meta name="author" content="dev kumar prajapati">

    <!-- open graph Meta tag -->
    <meta property="og:title" content="Datepicker ui">
    <meta property="og:description" content="Build a Datepicker ui using grid + flexbox, html and css">
    <meta property="og:image" content="https://www.alamy.com/computer-engineer-line-icon-male-symbol-with-computer-monitor-image229528012.html">
    <meta property="og:url" content="https://yourwebsite.com">
    <meta property="og:type" content="website">

    <!-- favicon -->
    <link rel="icon" type="image/png" href="image/calendar.png">
    
    <!-- external css -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="calendar">
            <div class="input-box">
                <input id="text" type="text" placeholder="dd / mm / yy">
                <button class="icon-btn" type="button" >
                    <img src="image/calendar.svg" alt="calendar">
                </button>
            </div>
            <div class="grid-container">
                <div class="month-box">
                    <div class="month">
                    <span class="arrow">&#8249;</span>
                        <p>December 2022</p>                 
                        <span class="arrow">&#8250;</span>
                    </div>
                    <div class="week">
                        <p>s</p>
                        <p>M</p>
                        <p>T</p>
                        <p>W</p>
                        <p>T</p>
                        <p>F</p>
                        <p>S</p>
                    </div>
                </div>
                <div class="date">
                    <p class="not-active"></p>
                    <p class="not-active"></p>
                    <p>1</p>
                    <p>2</p>
                    <p>3</p>
                    <p>4</p>
                    <p>5</p>
                    <p>6</p>
                    <p>7</p>
                    <p>8</p>
                    <p>9</p>
                    <p>10</p>
                    <p>11</p>
                    <p>12</p>
                    <p>13</p>
                    <p>14</p>
                    <p>15</p>
                    <p>16</p>
                    <p>17</p>
                    <p>18</p>
                    <p>19</p>
                    <p>20</p>
                    <p>21</p>
                    <p>22</p>
                    <p>23</p>
                    <p>24</p>
                    <p>25</p>
                    <p>26</p>
                    <p>27</p>
                    <p>28</p>
                    <p>29</p>
                    <p>30</p>
                    <p>31</p>
                    <p class="not-active"></p>
                    <p class="not-active"></p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
